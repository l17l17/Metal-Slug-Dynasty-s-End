<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Metal Slug: Dynasty's End</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
canvas { border:2px solid #333; display:block; cursor:none; }
#info { color:#555; font-size:11px; margin-top:5px; text-align:center; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="info">WASD/Arrows: Move/Jump/Duck &nbsp;|&nbsp; Left Click: Shoot &nbsp;|&nbsp; Right Click: Grenade &nbsp;|&nbsp; ↑ Near Tank: Board &nbsp;|&nbsp; ↓/S In Tank: Exit</div>
<script>
// ─── SETUP ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 800, GH = 450;
canvas.width = GW; canvas.height = GH;
const GROUND = 390, GRAVITY = 0.55, JUMP_F = -13;

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {}, jp = {};
let mouseX=GW/2, mouseY=GH/2, leftDown=false, rightJP=false;

document.addEventListener('keydown', e => {
  if(!keys[e.code]) jp[e.code]=true;
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter','Escape'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code]=false; });
function consume(c){ const v=jp[c]; jp[c]=false; return v; }
function clearJP(){ Object.keys(jp).forEach(k=>jp[k]=false); }

canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
});
canvas.addEventListener('mousedown', e => {
  if(e.button===0) leftDown=true;
  if(e.button===2){ e.preventDefault(); rightJP=true; }
});
canvas.addEventListener('mouseup', e => { if(e.button===0) leftDown=false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let AC, musicStarted=false;
function ac(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq,type='square',dur=0.08,vol=0.12,slide=0.5){
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.setValueAtTime(freq,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*slide,a.currentTime+dur);
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
const sfx={
  shoot:  ()=>beep(900,'square',0.04,0.08,0.6),
  hmg:    ()=>beep(700,'square',0.025,0.09,0.7),
  rocket: ()=>beep(180,'sawtooth',0.18,0.18,0.3),
  boom:   ()=>beep(110,'sawtooth',0.4,0.22,0.18),
  jump:   ()=>beep(320,'sine',0.13,0.09,1.6),
  hit:    ()=>beep(160,'sawtooth',0.1,0.2,0.4),
  pickup: ()=>{beep(500,'sine',0.1,0.14,1);setTimeout(()=>beep(750,'sine',0.1,0.12,1),80);},
  heal:   ()=>{beep(600,'sine',0.12,0.14,1);setTimeout(()=>beep(800,'sine',0.12,0.12,1),100);setTimeout(()=>beep(1000,'sine',0.12,0.1,1),200);},
  warn:   ()=>beep(440,'square',0.06,0.15,0.8),
  bossDead:()=>[0,150,300,450].forEach(d=>setTimeout(()=>beep(400-d,'square',0.14,0.18),d)),
  victory: ()=>[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>beep([523,659,784,1047,1319][i],'sine',0.2,0.18),d)),
};

// ─── MUSIC ENGINE ────────────────────────────────────────────────────────────
const B=0.45; // beat at ~133 BPM march tempo
const SONGS=[
  // 전선을 간다 (March to the Front) - approximate
  [
    {f:392,d:B/2},{f:392,d:B/2},{f:440,d:B},{f:392,d:B},{f:330,d:B},
    {f:0,d:B/4},{f:262,d:B/4},{f:294,d:B/2},{f:392,d:B*1.5},{f:0,d:B/2},
    {f:392,d:B/2},{f:392,d:B/2},{f:440,d:B},{f:392,d:B},{f:294,d:B},
    {f:262,d:B*1.5},{f:0,d:B*0.5},
    {f:659,d:B/2},{f:659,d:B/2},{f:587,d:B},{f:523,d:B},{f:494,d:B/2},{f:440,d:B/2},
    {f:392,d:B*1.5},{f:0,d:B/2},
    {f:440,d:B/2},{f:440,d:B/2},{f:494,d:B},{f:440,d:B},{f:392,d:B},
    {f:330,d:B/2},{f:294,d:B/2},{f:262,d:B*1.5},{f:0,d:B*0.5},
    {f:392,d:B/2},{f:392,d:B/2},{f:523,d:B},{f:440,d:B},{f:392,d:B},
    {f:330,d:B*1.5},{f:0,d:B*0.5},
    {f:392,d:B/2},{f:392,d:B/2},{f:440,d:B},{f:392,d:B},{f:294,d:B},
    {f:262,d:B*2},{f:0,d:B},
  ],
  // 전우 (Comrades) - approximate
  [
    {f:523,d:B*1.5},{f:392,d:B/2},{f:440,d:B},{f:392,d:B*2},
    {f:523,d:B*1.5},{f:587,d:B/2},{f:659,d:B*2},{f:0,d:B},
    {f:659,d:B*1.5},{f:523,d:B/2},{f:587,d:B},{f:523,d:B*2},
    {f:392,d:B*1.5},{f:330,d:B/2},{f:392,d:B*2},{f:0,d:B},
    {f:440,d:B*1.5},{f:392,d:B/2},{f:440,d:B},{f:523,d:B*2},
    {f:440,d:B},{f:392,d:B},{f:330,d:B*2},{f:0,d:B},
    {f:523,d:B*1.5},{f:392,d:B/2},{f:440,d:B},{f:392,d:B*2},
    {f:262,d:B*3},{f:0,d:B},
  ],
  // 군가 fanfare march
  [
    {f:262,d:B/4},{f:262,d:B/4},{f:262,d:B/4},{f:262,d:B/4},
    {f:262,d:B/2},{f:330,d:B/2},{f:392,d:B},{f:0,d:B/2},
    {f:392,d:B/4},{f:392,d:B/4},{f:392,d:B/2},{f:330,d:B/2},{f:294,d:B/2},
    {f:262,d:B*1.5},{f:0,d:B/2},
    {f:330,d:B/4},{f:330,d:B/4},{f:330,d:B/4},{f:330,d:B/4},
    {f:330,d:B/2},{f:392,d:B/2},{f:440,d:B},{f:0,d:B/2},
    {f:440,d:B/4},{f:440,d:B/4},{f:440,d:B/2},{f:392,d:B/2},{f:330,d:B/2},
    {f:262,d:B*1.5},{f:0,d:B/2},
    {f:523,d:B/2},{f:523,d:B/2},{f:523,d:B/4},{f:494,d:B/4},{f:523,d:B/2},
    {f:784,d:B*1.5},{f:0,d:B/4},{f:659,d:B/4},{f:587,d:B/4},{f:523,d:B/4},
    {f:440,d:B},{f:392,d:B},{f:330,d:B/2},{f:294,d:B/2},
    {f:262,d:B*2},{f:0,d:B},
  ]
];
let musicSong=0, musicNote=0, musicNext=0, musicRunning=false;
function startMusic(){
  if(musicStarted) return; musicStarted=true; musicRunning=true;
  musicNext=ac().currentTime+0.1; _schedMusic();
}
function _schedMusic(){
  if(!musicRunning) return;
  try{
    const a=ac();
    while(musicNext<a.currentTime+0.25){
      const n=SONGS[musicSong][musicNote];
      if(n.f>0){
        const o=a.createOscillator(),g=a.createGain();
        o.connect(g); g.connect(a.destination);
        o.type='square'; o.frequency.value=n.f;
        g.gain.setValueAtTime(0.055,musicNext);
        g.gain.exponentialRampToValueAtTime(0.001,musicNext+n.d*0.82);
        o.start(musicNext); o.stop(musicNext+n.d*0.88);
      }
      musicNext+=n.d;
      musicNote++;
      if(musicNote>=SONGS[musicSong].length){
        musicNote=0; musicSong=(musicSong+1)%SONGS.length;
      }
    }
  }catch(e){}
  setTimeout(_schedMusic,60);
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
let parts=[];
function spawnParts(x,y,n,colors,spd=4,life=45){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*spd+0.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*2,
      life,max:life+20,color:colors[Math.floor(Math.random()*colors.length)],sz:Math.random()*3+2});
  }
}
function boom(x,y){
  spawnParts(x,y,18,['#ff6600','#ff9900','#ffcc00','#fff'],6,55);
  spawnParts(x,y,8,['#555','#888'],3,40);
  sfx.boom();
}
function tickParts(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--; if(p.life<=0) parts.splice(i,1); } }
function drawParts(){ parts.forEach(p=>{ ctx.globalAlpha=p.life/p.max; ctx.fillStyle=p.color; ctx.fillRect(Math.round(p.x-camX)-p.sz/2,Math.round(p.y)-p.sz/2,p.sz,p.sz); }); ctx.globalAlpha=1; }

// ─── FLOATING KOREAN TEXT ─────────────────────────────────────────────────────
let floatTexts=[];
function spawnText(x,y,text,color='#fff',size=15){
  floatTexts.push({x,y,text,color,size,life:130,max:130,vy:-0.6});
}
function tickTexts(){ for(let i=floatTexts.length-1;i>=0;i--){ const t=floatTexts[i]; t.y+=t.vy; t.life--; if(t.life<=0) floatTexts.splice(i,1); } }
function drawTexts(){
  floatTexts.forEach(t=>{
    ctx.globalAlpha=Math.min(1,t.life/30)*Math.min(1,t.life/t.max*3);
    ctx.fillStyle=t.color; ctx.font=`bold ${t.size}px 'Malgun Gothic','Apple SD Gothic Neo',sans-serif`;
    ctx.textAlign='center';
    // outline
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.strokeText(t.text,t.x-camX,t.y);
    ctx.fillText(t.text,t.x-camX,t.y);
  });
  ctx.globalAlpha=1;
}

// ─── CAMERA & OBSTACLES ──────────────────────────────────────────────────────
let camX=0, lvlW=4000;
function clampCam(){ camX=Math.max(0,Math.min(camX,lvlW-GW)); }
let curObstacles=[];
function getGroundAt(x){
  let g=GROUND;
  for(const ob of curObstacles){ if(x>ob.x&&x<ob.x+ob.w&&ob.y<g) g=ob.y; }
  return g;
}

// ─── STAR HELPER ─────────────────────────────────────────────────────────────
function drawStar(x,y,r1,r2,color){
  ctx.fillStyle=color; ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2-Math.PI/2,r=i%2===0?r1:r2;
    i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
}

// Draw South Korean flag (Taegukgi) patch
function drawSKFlag(x,y,w=14,h=9){
  ctx.fillStyle='#fff'; ctx.fillRect(x,y,w,h);
  // Red upper half of taeguk
  ctx.fillStyle='#C60C30';
  ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,w*0.28,h*0.38,0,Math.PI,0); ctx.fill();
  // Blue lower half of taeguk
  ctx.fillStyle='#003478';
  ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,w*0.28,h*0.38,0,0,Math.PI); ctx.fill();
  // border
  ctx.strokeStyle='#aaa'; ctx.lineWidth=0.5;
  ctx.strokeRect(x,y,w,h);
}

// Draw North Korean flag patch (mini)
function drawNKFlag(x,y,w=13,h=8){
  ctx.fillStyle='#CC0000'; ctx.fillRect(x,y,w,h*0.35);
  ctx.fillStyle='#fff';    ctx.fillRect(x,y+h*0.35,w,h*0.08);
  ctx.fillStyle='#024FA2'; ctx.fillRect(x,y+h*0.43,w,h*0.14);
  ctx.fillStyle='#fff';    ctx.fillRect(x,y+h*0.57,w,h*0.08);
  ctx.fillStyle='#CC0000'; ctx.fillRect(x,y+h*0.65,w,h*0.35);
  drawStar(x+w*0.18,y+h*0.5,h*0.22,h*0.1,'#fff');
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
let pbullets=[], ebullets=[];
class Bullet{
  constructor(x,y,vx,vy,dmg=1,color='#ffff00',sz=4){ this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.dmg=dmg;this.color=color;this.sz=sz;this.alive=true; }
  tick(){
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<camX-60||this.x>camX+GW+60||this.y>GROUND+10||this.y<-50){this.alive=false;return;}
    for(const ob of curObstacles){
      if(this.x>ob.x&&this.x<ob.x+ob.w&&this.y>=ob.y){
        this.alive=false; spawnParts(this.x,ob.y,3,['#aaa','#ccc'],2,12); break;
      }
    }
  }
  draw(){ ctx.fillStyle=this.color; ctx.fillRect(Math.round(this.x-camX)-this.sz,Math.round(this.y)-this.sz/2,this.sz*2,this.sz); }
}
class Rocket extends Bullet{
  constructor(x,y,vx,vy=0,dmg=3){ super(x,y,vx,vy,dmg,'#ff6600',6); this.trail=[]; }
  tick(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    super.tick();
  }
  draw(){
    this.trail.forEach((p,i)=>{ ctx.globalAlpha=(i/this.trail.length)*0.4; ctx.fillStyle='#ff9900'; ctx.fillRect(Math.round(p.x-camX)-3,Math.round(p.y)-3,6,6); });
    ctx.globalAlpha=1;
    ctx.fillStyle='#ff6600'; ctx.fillRect(Math.round(this.x-camX)-8,Math.round(this.y)-4,16,8);
    ctx.fillStyle='#ffcc00';
    const tip=this.vx>0?8:-12;
    ctx.fillRect(Math.round(this.x-camX)+tip,Math.round(this.y)-2,4,4);
  }
}

// ─── GRENADES ────────────────────────────────────────────────────────────────
let grenades=[];
class Grenade{
  constructor(x,y,vx,vy){ this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.alive=true;this.fuse=160; }
  tick(){
    this.x+=this.vx; this.y+=this.vy; this.vy+=GRAVITY*0.65; this.vx*=0.99;
    const gy=getGroundAt(this.x);
    if(this.y>=gy){ this.y=gy; this.vy*=-0.45; this.vx*=0.75; if(Math.abs(this.vy)<1)this.vy=0; }
    this.fuse--; if(this.fuse<=0) this.explode();
  }
  explode(){
    boom(this.x,this.y);
    const R=90;
    [...enemies,...helis].forEach(e=>{ if(!e.alive)return; if(Math.hypot(e.x-this.x,e.y-this.y)<R) e.hit(30); });
    if(boss&&boss.alive&&boss.dT<0&&Math.hypot(boss.x-this.x,boss.y-this.y)<R) boss.hit(30);
    if(!pl.inTank&&Math.hypot(pl.x-this.x,pl.y-this.y)<R*0.45) pl.damage(25);
    this.alive=false;
  }
  draw(){
    const flash=this.fuse<60&&Math.floor(this.fuse/6)%2===0;
    ctx.fillStyle=flash?'#ff0000':'#228822';
    ctx.beginPath(); ctx.arc(Math.round(this.x-camX),Math.round(this.y-5),5,0,Math.PI*2); ctx.fill();
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
let pl, lives=3, score=0;
class Player{
  constructor(){
    this.x=100; this.y=GROUND; this.vx=0; this.vy=0;
    this.face=1; this.duck=false; this.onGnd=true;
    this.gun='K2'; this.ammo={K2:Infinity,AK47:0,rocket:0};
    this.nades=5; this.cooldown=0; this.inv=0; this.inTank=null; this.inHeli=null;
    this.alive=true; this.af=0; this.at=0; this.walk=false;
    this.hp=100; this.maxhp=100;
  }
  damage(amt=10){
    if(this.inv>0||this.inTank||this.inHeli) return;
    this.hp-=amt; sfx.hit(); this.inv=110;
    spawnParts(this.x,this.y-25,6,['#f00','#f88'],3,20);
    if(this.hp<=0){
      lives--;
      if(lives<=0){ this.alive=false; }
      else { this.hp=100; this.vy=0; this.vx=0; }
    }
  }
  tick(){
    if(!this.alive) return;
    if(this.inv>0) this.inv--;
    if(this.inTank||this.inHeli) return;
    const spd=this.duck?1.5:3.2;
    this.walk=false;
    const goL=keys['ArrowLeft']||keys['KeyA'];
    const goR=keys['ArrowRight']||keys['KeyD'];
    const goU=keys['ArrowUp']||keys['KeyW'];
    const goD=keys['ArrowDown']||keys['KeyS'];
    if(goL){ this.vx=-spd; this.walk=true; }
    else if(goR){ this.vx=spd; this.walk=true; }
    else this.vx*=0.65;
    // consume jump key ONCE — try tank board first, then jump
    const jumpPressed=consume('ArrowUp')||consume('KeyW');
    this.duck=goD&&this.onGnd;
    // face mouse
    const wmx=mouseX+camX;
    this.face=wmx>=this.x?1:-1;
    // physics
    this.vy+=GRAVITY; this.y+=this.vy; this.x+=this.vx;
    const gy=getGroundAt(this.x);
    if(this.y>=gy){ this.y=gy; this.vy=0; this.onGnd=true; } else this.onGnd=false;
    this.x=Math.max(10,Math.min(this.x,lvlW-10));
    if(jumpPressed){
      let boarded=false;
      for(const t of ftanks){
        if(!t.dead&&Math.abs(t.x-this.x)<65&&Math.abs(t.y-this.y)<40){ this.inTank=t; t.rider=this; boarded=true; break; }
      }
      if(!boarded){
        for(const h of fhelis){
          if(!h.dead&&!h.rider&&Math.abs(h.x-this.x)<70&&Math.abs(h.y-this.y)<55){ this.inHeli=h; h.rider=this; boarded=true; break; }
        }
      }
      if(!boarded&&this.onGnd&&!this.duck){ this.vy=JUMP_F; this.onGnd=false; sfx.jump(); }
    }
    // shoot (left click or hold)
    if(this.cooldown>0) this.cooldown--;
    if(leftDown&&this.cooldown<=0) this.shoot();
    // right click grenade
    if(rightJP&&this.nades>0){ this.throwNade(); rightJP=false; }
    this.at++; if(this.at>8){ this.at=0; this.af=(this.af+1)%4; }
  }
  shoot(){
    const cd={K2:16,AK47:8,rocket:28};
    this.cooldown=cd[this.gun]||16;
    if(this.gun!=='K2'){
      this.ammo[this.gun]--;
      if(this.ammo[this.gun]<=0){ this.ammo[this.gun]=0; this.gun='K2'; }
    }
    const bx=this.x+this.face*18;
    const by=this.duck?this.y-14:this.y-22;
    const wx=mouseX+camX, wy=mouseY;
    const dx=wx-bx, dy=wy-by, d=Math.hypot(dx,dy)||1;
    const spd=this.gun==='AK47'?15:this.gun==='rocket'?11:13;
    const dmg=this.gun==='AK47'?2:1;
    if(this.gun==='rocket'){ pbullets.push(new Rocket(bx,by,(dx/d)*spd,(dy/d)*3)); sfx.rocket(); }
    else{ pbullets.push(new Bullet(bx,by,(dx/d)*spd,(dy/d)*spd,dmg,this.gun==='AK47'?'#ff9900':'#ffff00')); sfx.shoot(); }
  }
  throwNade(){
    this.nades--;
    const wx=mouseX+camX, dx=wx-this.x;
    const vx=Math.sign(dx)*Math.min(Math.abs(dx)*0.07,7);
    grenades.push(new Grenade(this.x,this.y-22,vx,-10));
  }
  draw(){
    if(!this.alive) return;
    if(this.inv>0&&Math.floor(this.inv/5)%2===0) return;
    const sx=Math.round(this.x-camX), sy=Math.round(this.y);
    ctx.save(); ctx.translate(sx,sy);
    if(this.face===-1) ctx.scale(-1,1);
    this.duck?this._drawDuck():this._drawStand();
    ctx.restore();
  }
  _drawStand(){
    ctx.fillStyle='#3a2800'; ctx.fillRect(-7,-8,6,8); ctx.fillRect(3,-8,6,8);
    ctx.fillStyle='#4a6a30'; ctx.fillRect(-7,-22,6,14); ctx.fillRect(3,-22,6,14);
    ctx.fillStyle='#7a3a10'; ctx.fillRect(-9,-24,18,4);
    ctx.fillStyle='#4a6a30'; ctx.fillRect(-9,-38,18,16);
    // SK flag on left arm
    ctx.save(); ctx.scale(1,1);
    drawSKFlag(-14,-36,13,8);
    ctx.restore();
    ctx.fillStyle='#4a6a30'; ctx.fillRect(9,-37,6,10);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(13,-34,14,4);
    ctx.fillStyle='#c8a070'; ctx.fillRect(-6,-50,13,13);
    ctx.fillStyle='#4a6a30'; ctx.fillRect(-7,-54,14,7); ctx.fillRect(-9,-56,18,4);
  }
  _drawDuck(){
    ctx.fillStyle='#3a2800'; ctx.fillRect(-9,-6,8,6); ctx.fillRect(3,-6,8,6);
    ctx.fillStyle='#4a6a30'; ctx.fillRect(-9,-24,18,18);

let pickups=[];
class Pickup{
  constructor(x,type){this.x=x;this.y=getGroundAt(x);this.type=type;this.alive=true;this.t=0;}
  tick(){
    this.t+=0.06;
    if(!pl.inTank&&Math.abs(pl.x-this.x)<26&&Math.abs(pl.y-this.y)<32) this.collect();
  }
  collect(){
    this.alive=false;
    if(this.type==='AK47'){pl.gun='AK47';pl.ammo.AK47=80;sfx.pickup();}
    else if(this.type==='rocket'){pl.gun='rocket';pl.ammo.rocket=10;sfx.pickup();}
    else if(this.type==='grenade'){pl.nades=Math.min(pl.nades+5,20);sfx.pickup();}
    else if(this.type==='protein'){pl.hp=Math.min(pl.hp+40,pl.maxhp);sfx.heal();spawnText(pl.x,pl.y-60,'HP RESTORED!','#00ff88',14);}
  }
  draw(){
    if(this.x<camX-40||this.x>camX+GW+40) return;
    const gy=getGroundAt(this.x);
    const sx=Math.round(this.x-camX),sy=Math.round(gy-8+Math.sin(this.t)*5);
    if(this.type==='protein'){
      // protein bar (green wrapper)
      ctx.fillStyle='#228822';ctx.fillRect(sx-14,sy-12,28,20);
      ctx.fillStyle='#33aa33';ctx.fillRect(sx-12,sy-10,24,6);
      ctx.fillStyle='#fff';ctx.font='bold 7px Courier New';ctx.textAlign='center';
      ctx.fillText('PROTEIN',sx,sy+4);
      ctx.fillText('BAR',sx,sy+12);
    } else {
      ctx.fillStyle='#fc0';ctx.fillRect(sx-14,sy-14,28,28);
      ctx.fillStyle='#000';ctx.font='bold 9px Courier New';ctx.textAlign='center';
      ctx.fillText({'AK47':'AK47',rocket:'RKT',grenade:'GRN'}[this.type]||'?',sx,sy+4);
    }
  }
}

// ─── OBSTACLES ───────────────────────────────────────────────────────────────
function drawObstacles(){
  for(const ob of curObstacles){
    const sx=ob.x-camX;
    if(sx<-ob.w-20||sx>GW+20) continue;
    switch(ob.type){
      case 'sandbag':
        ctx.fillStyle='#7a6a3a';ctx.fillRect(sx,ob.y,ob.w,GROUND-ob.y);
        ctx.fillStyle='#9a8a5a';
        for(let y=ob.y+3;y<GROUND;y+=11){ctx.fillRect(sx+2,y,ob.w-4,7);}
        ctx.fillStyle='#5a4a20';
        for(let y=ob.y+9;y<GROUND;y+=11){ctx.fillRect(sx,y,ob.w,2);}
        break;
      case 'crate':
        ctx.fillStyle='#8B4513';ctx.fillRect(sx,ob.y,ob.w,GROUND-ob.y);
        ctx.strokeStyle='#5a2a08';ctx.lineWidth=2;ctx.strokeRect(sx+1,ob.y+1,ob.w-2,GROUND-ob.y-2);
        ctx.beginPath();ctx.moveTo(sx,ob.y);ctx.lineTo(sx+ob.w,GROUND);ctx.moveTo(sx+ob.w,ob.y);ctx.lineTo(sx,GROUND);ctx.stroke();
        break;
      case 'bunker':
        ctx.fillStyle='#555';ctx.fillRect(sx,ob.y,ob.w,GROUND-ob.y);
        ctx.fillStyle='#777';ctx.fillRect(sx+4,ob.y+4,ob.w-8,10);
        ctx.fillStyle='#333';ctx.fillRect(sx+ob.w/2-10,ob.y+8,20,8);
        // gun slit
        ctx.fillStyle='#111';ctx.fillRect(sx+ob.w/2-6,ob.y+10,12,4);
        break;
      case 'hill':
        ctx.fillStyle='#2a5018';
        ctx.beginPath();ctx.moveTo(sx-15,GROUND);ctx.quadraticCurveTo(sx+ob.w/2,ob.y-18,sx+ob.w+15,GROUND);ctx.fill();
        ctx.fillStyle='#3a7028';
        ctx.beginPath();ctx.moveTo(sx,ob.y+8);ctx.quadraticCurveTo(sx+ob.w/2,ob.y-12,sx+ob.w,ob.y+8);ctx.fill();
        // grass tufts
        ctx.fillStyle='#4a9038';
        for(let gx=sx+10;gx<sx+ob.w-10;gx+=20){ctx.fillRect(gx,ob.y+2,3,6);ctx.fillRect(gx+5,ob.y,3,8);}
        break;
      case 'wall':
        ctx.fillStyle='#444';ctx.fillRect(sx,ob.y,ob.w,GROUND-ob.y);
        ctx.fillStyle='#555';
        for(let wy=ob.y;wy<GROUND;wy+=16){
          const off=(Math.floor((wy-ob.y)/16)%2)*12;
          for(let wx=sx+off;wx<sx+ob.w;wx+=24){ctx.fillRect(wx+1,wy+1,22,13);}
        }
        break;
    }
  }
}

  // grenades
  ctx.fillStyle='#6f6';ctx.fillText('✦ GRENADES: '+pl.nades,10,55);
  // tank hud
  if(pl.inTank){
    ctx.fillStyle='#0cf';ctx.font='bold 11px Courier New';ctx.textAlign='center';
    ctx.fillText('IN TANK — Left:FIRE  Right:GRENADE  S/↓:EXIT',GW/2,GH-18);
    const t=pl.inTank;
    ctx.fillStyle='#700';ctx.fillRect(GW/2-65,GH-36,130,8);
    ctx.fillStyle='#0d0';ctx.fillRect(GW/2-65,GH-36,130*(t.hp/t.maxhp),8);
    ctx.fillStyle='#fff';ctx.font='9px Courier New';ctx.fillText('TANK HP',GW/2,GH-40);
  }
  if(pl.inHeli){
    ctx.fillStyle='#adf';ctx.font='bold 11px Courier New';ctx.textAlign='center';
    ctx.fillText('IN HELI — WASD:FLY  Left:ROCKETS  Right:BOMB  S/↓:EXIT',GW/2,GH-18);
    const h=pl.inHeli;
    ctx.fillStyle='#047';ctx.fillRect(GW/2-65,GH-36,130,8);
    ctx.fillStyle='#0af';ctx.fillRect(GW/2-65,GH-36,130*(h.hp/h.maxhp),8);
    ctx.fillStyle='#fff';ctx.font='9px Courier New';ctx.fillText('HELI HP',GW/2,GH-40);
  }
  // stage name
  if(stageNameT>0){
    stageNameT--;
    ctx.globalAlpha=Math.min(1,stageNameT/25)*Math.min(1,stageNameT/25+0.3);
    ctx.fillStyle='#fc0';ctx.font='bold 24px \'Malgun Gothic\',sans-serif';ctx.textAlign='center';
    ctx.fillText(stageName,GW/2,GH/2-40);
    ctx.globalAlpha=1;
  }
  // exit marker
  if(curStage<LEVELS.length){
    const ex=LEVELS[curStage].endX-camX;
    if(ex>10&&ex<GW){ctx.fillStyle='#fc0';ctx.fillRect(ex,GROUND-70,4,70);ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText('EXIT',ex,GROUND-74);}
  }
  // crosshair
  drawCrosshair();
}
function drawCrosshair(){
  const x=mouseX,y=mouseY;
  ctx.strokeStyle='rgba(255,255,0,0.85)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-12,y);ctx.lineTo(x-4,y);ctx.moveTo(x+4,y);ctx.lineTo(x+12,y);
  ctx.moveTo(x,y-12);ctx.lineTo(x,y-4);ctx.moveTo(x,y+4);ctx.lineTo(x,y+12);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.stroke();
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function collide(){
  for(const b of pbullets){
    if(!b.alive) continue;
    for(const e of enemies){if(!e.alive)continue;if(Math.abs(b.x-e.x)<16&&Math.abs(b.y-(e.y-20))<26){b.alive=false;e.hit(b.dmg);break;}}
    for(const h of helis){if(!h.alive)continue;if(Math.abs(b.x-h.x)<36&&Math.abs(b.y-h.y)<22){b.alive=false;h.hit(b.dmg);break;}}
    if(boss&&boss.alive&&boss.dT<0){const bw=boss.w/2+4,bh=boss.hh;if(Math.abs(b.x-boss.x)<bw&&b.y>boss.y-bh-4&&b.y<boss.y+10){b.alive=false;boss.hit(b.dmg);}}
  }
  for(const b of ebullets){
    if(!b.alive) continue;
    // check obstacle block
    let blocked=false;
    for(const ob of curObstacles){if(b.x>ob.x&&b.x<ob.x+ob.w&&b.y>=ob.y){b.alive=false;spawnParts(b.x,ob.y,2,['#888'],1.5,10);blocked=true;break;}}
    if(blocked) continue;
    if(pl.inHeli){const h=pl.inHeli;if(Math.abs(b.x-h.x)<40&&Math.abs(b.y-h.y)<22){b.alive=false;h.hit(5);}}
    else if(pl.inTank){const t=pl.inTank;if(Math.abs(b.x-t.x)<44&&Math.abs(b.y-(t.y-20))<22){b.alive=false;t.hit(5);}}
    else{if(Math.abs(b.x-pl.x)<13&&Math.abs(b.y-(pl.y-20))<24){b.alive=false;pl.damage(b.dmg);}}
  }
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let gameState='menu';
function initGame(){
  lives=3;score=0;curStage=0;
  pl=new Player();parts=[];floatTexts=[];
  loadStage(0);gameState='playing';
  startMusic();
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────
function drawMenu(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,GW,GH);
  ctx.fillStyle='#880000';ctx.fillRect(0,185,GW,8);ctx.fillRect(0,200,GW,8);
  ctx.fillStyle='#004488';ctx.fillRect(0,215,GW,8);
  ctx.shadowColor='#cc0000';ctx.shadowBlur=18;
  ctx.fillStyle='#cc0000';ctx.font='bold 44px Courier New';ctx.textAlign='center';ctx.fillText('METAL SLUG:',GW/2,110);
  ctx.fillStyle='#fc0';ctx.font='bold 36px Courier New';ctx.fillText("DYNASTY'S END",GW/2,158);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fc0';ctx.font='bold 16px \'Malgun Gothic\',sans-serif';ctx.fillText('DESTROY THE KIM DYNASTY!',GW/2,248);
  ctx.fillStyle='#888';ctx.font='13px Courier New';
  ctx.fillText('WASD/Arrows: Move/Jump/Duck',GW/2,290);
  ctx.fillText('Left Click: Shoot  |  Right Click: Grenade',GW/2,310);
  ctx.fillText('↑/W Near Tank: Board  |  ↓/S In Tank: Exit',GW/2,330);
  ctx.fillText('Green Box: Protein Bar = Restore HP',GW/2,350);
  ctx.fillText('M: Toggle Music Mute',GW/2,370);
  if(Math.floor(Date.now()/550)%2){ctx.fillStyle='#fc0';ctx.font='bold 22px Courier New';ctx.fillText('PRESS ENTER TO START',GW/2,410);}
  drawCrosshair();
}
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,GW,GH);
  ctx.fillStyle='#f00';ctx.font='bold 64px Courier New';ctx.textAlign='center';ctx.fillText('GAME OVER',GW/2,GH/2-20);
  ctx.fillStyle='#fff';ctx.font='20px Courier New';ctx.fillText('SCORE: '+String(score).padStart(8,'0'),GW/2,GH/2+30);
  ctx.fillStyle='#888';ctx.font='14px Courier New';ctx.fillText('PRESS ENTER',GW/2,GH/2+70);
}
function drawVictory(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,GW,GH);
  const t=Date.now()*0.001;
  for(let i=0;i<6;i++){const fx=80+i*130,fy=80+Math.sin(t+i)*40,cols=['#f00','#fc0','#0f0','#0cf','#f0f','#fff'];ctx.fillStyle=cols[i];for(let j=0;j<10;j++){const a=(j/10)*Math.PI*2+t*2,r=18+Math.sin(t*4+i)*8;ctx.fillRect(fx+Math.cos(a)*r-2,fy+Math.sin(a)*r-2,4,4);}}
  ctx.fillStyle=`hsl(${t*80},100%,65%)`;ctx.font='bold 54px Courier New';ctx.textAlign='center';ctx.fillText('VICTORY!',GW/2,170);
  ctx.fillStyle='#fc0';ctx.font='bold 20px \'Malgun Gothic\',sans-serif';ctx.fillText('LONG LIVE KOREA!!!',GW/2,215);
  ctx.fillStyle='#fff';ctx.font='bold 18px \'Malgun Gothic\',sans-serif';ctx.fillText('THE KIM DYNASTY HAS FALLEN!',GW/2,250);
  ctx.fillStyle='#fff';ctx.font='16px Courier New';ctx.fillText('FINAL SCORE: '+String(score).padStart(8,'0'),GW/2,290);
  ctx.fillStyle='#888';ctx.font='13px Courier New';ctx.fillText('PRESS ENTER',GW/2,400);
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function update(){
  if(gameState==='menu'){ if(consume('Enter')||consume('Space')) initGame(); return; }
  // mute toggle (works in all states)
  if(consume('KeyM')){ musicRunning=!musicRunning; if(musicRunning&&musicStarted){ musicNext=ac().currentTime+0.1; _schedMusic(); } }
  if(gameState==='gameover'||gameState==='victory'){ if(consume('Enter')||consume('Space')) gameState='menu'; return; }
  // pause toggle
  if(consume('KeyP')||consume('Escape')){ gameState=gameState==='paused'?'playing':'paused'; }
  if(gameState==='paused') return;
  if(stageCleared){ transT--; if(transT<=0){curStage++;loadStage(curStage);} return; }

  pl.tick();
  ftanks.forEach(t=>t.tick());
  fhelis.forEach(h=>h.tick());
  enemies.forEach(e=>e.tick());helis.forEach(h=>h.tick());
  enemies=enemies.filter(e=>e.alive);helis=helis.filter(h=>h.alive);
  fhelis=fhelis.filter(h=>!h.dead);
  if(boss) boss.tick();
  pbullets.forEach(b=>b.tick());ebullets.forEach(b=>b.tick());grenades.forEach(g=>g.tick());
  pbullets=pbullets.filter(b=>b.alive);ebullets=ebullets.filter(b=>b.alive);grenades=grenades.filter(g=>g.alive);
  pickups.forEach(p=>p.tick());pickups=pickups.filter(p=>p.alive);
  tickParts();tickTexts();collide();

  if(curStage<LEVELS.length&&pl.x>LEVELS[curStage].endX&&!stageCleared){
    stageCleared=true;transT=180;stageName='STAGE CLEAR!';stageNameT=160;score+=1000;sfx.pickup();
  }

  const target=(pl.inTank?pl.inTank.x:pl.x)-GW*0.35;
  camX+=(target-camX)*0.1;clampCam();

  if(!pl.alive){ if(lives<=0)gameState='gameover'; else{pl.alive=true;pl.hp=100;pl.inv=220;pl.inTank=null;pl.inHeli=null;pl.x=Math.max(camX+60,pl.x);pl.y=GROUND;pl.vy=0;} }

  rightJP=false;clearJP();
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,GW,GH);
  ctx.fillStyle='#fc0';ctx.font='bold 52px Courier New';ctx.textAlign='center';ctx.fillText('PAUSED',GW/2,GH/2-20);
  ctx.fillStyle='#aaa';ctx.font='14px Courier New';
  ctx.fillText('P / ESC — Resume',GW/2,GH/2+25);
  ctx.fillText('M — '+(musicRunning?'Mute Music':'Unmute Music'),GW/2,GH/2+48);
}
function draw(){
  ctx.clearRect(0,0,GW,GH);
  if(gameState==='menu'){drawMenu();return;}
  if(gameState==='gameover'){drawGameOver();return;}
  if(gameState==='victory'){drawVictory();return;}
  drawBG();
  drawObstacles();
  ftanks.forEach(t=>t.draw());
  fhelis.forEach(h=>h.draw());
  pickups.forEach(p=>p.draw());
  enemies.forEach(e=>e.draw());
  helis.forEach(h=>h.draw());
  if(boss) boss.draw();
  pl.draw();
  pbullets.forEach(b=>b.draw());
  ebullets.forEach(b=>b.draw());
  grenades.forEach(g=>g.draw());
  drawParts();
  drawTexts();
  drawHUD();
  if(gameState==='paused') drawPause();
}

function loop(){ update();draw();requestAnimationFrame(loop); }
pl=new Player();
requestAnimationFrame(loop);
</script>
